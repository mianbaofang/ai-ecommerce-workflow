<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Ecommerce Workflow Skill</title>
  <desc id="desc">A structured ecommerce product launch workflow from product input to launch plan.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF9F4"/>
      <stop offset="0.52" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef7f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.14"/>
